<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF3FF"/>
      <stop offset="1" stop-color="#E0EAFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1080" cy="80" r="200" fill="#1A56F0" fill-opacity="0.07"/>
  <circle cx="80" cy="580" r="180" fill="#1A56F0" fill-opacity="0.07"/>

  <!-- Logo icon -->
  <rect x="80" y="110" width="120" height="120" rx="26" fill="#1A56F0"/>
  <text x="140" y="178" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="50" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="-2">ED</text>

  <!-- Brand name -->
  <text x="224" y="157" fill="#0A1A4A" font-size="52" font-family="Arial, Helvetica, sans-serif" font-weight="800">ED LINE</text>
  <text x="226" y="207" fill="#1A56F0" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="500" letter-spacing="1">Edu Consultancy</text>

  <!-- Divider -->
  <rect x="80" y="268" width="560" height="3" rx="2" fill="#1A56F0" fill-opacity="0.2"/>

  <!-- Tagline -->
  <text x="80" y="330" fill="#0A1A4A" font-size="58" font-family="Arial, Helvetica, sans-serif" font-weight="800">Medical &amp; Professional</text>
  <text x="80" y="400" fill="#0A1A4A" font-size="58" font-family="Arial, Helvetica, sans-serif" font-weight="800">Admissions</text>
  <text x="80" y="458" fill="#374151" font-size="26" font-family="Arial, Helvetica, sans-serif">Expert guidance for top colleges across South India.</text>

  <!-- CTA Badge -->
  <rect x="80" y="498" width="280" height="58" rx="14" fill="#1A56F0"/>
  <text x="220" y="534" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Admissions Open Now</text>

  <!-- Right side Logo large watermark -->
  <rect x="840" y="180" width="260" height="260" rx="54" fill="#1A56F0" fill-opacity="0.08"/>
  <rect x="870" y="210" width="200" height="200" rx="42" fill="#1A56F0"/>
  <text x="970" y="314" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="88" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="-4">ED</text>
</svg>
